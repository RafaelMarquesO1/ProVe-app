name: prove
description: "ProVe - Provérbios Bíblicos"
publish_to: 'none'

version: 1.3.0+9
# Versão 9 - Adicionado Quiz, Modo Foco e Compartilhar como Imagem

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: any
  google_fonts: any
  go_router: ^17.1.0
  table_calendar: ^3.2.0
  share_plus: ^13.1.0
  confetti: any
  intl: ^0.20.2
  flutter_staggered_grid_view: any
  image_picker: any
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  flutter_tts: ^4.2.5
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  url_launcher: ^6.3.1
  in_app_update: ^4.2.3
  package_info_plus: ^10.1.0
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: any
  flutter_launcher_icons: any

flutter:
  uses-material-design: true

  assets:
    - assets/proverbiosBibliaLivre.json
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_logo_transparent.png
  adaptive_icon_background: "#FFF9F0"
  adaptive_icon_foreground: assets/images/app_logo_transparent.png
